<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single step ピーク探索ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .scale-up { animation: scaleUp 0.3s ease-out; }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Single step ピーク探索ナビ</h1>
            <p class="text-gray-600">測定された Rwp を入力して、最短でピークを追い込みます。</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Left Column: Controls and Status -->
            <div class="lg:col-span-1 flex flex-col gap-6">
                <div class="card p-6 bg-gray-50 border border-gray-200">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">ステップ設定</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] text-gray-500 mb-1">荒いステップ</label>
                            <input type="number" id="step-coarse" step="0.0001" value="0.0010" class="w-full p-1.5 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-500 mb-1">細かいステップ</label>
                            <input type="number" id="step-fine" step="0.0001" value="0.0001" class="w-full p-1.5 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <div class="card p-6 border-t-4 border-blue-500">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">ステータス</h2>
                    <div id="status-badge" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-600 mb-2 uppercase">
                        待機中
                    </div>
                    <div id="instruction" class="text-lg font-bold text-gray-800 leading-tight">
                        開始 2θ を入力してください。
                    </div>
                </div>

                <div class="card p-6">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">入力 / 操作</h2>
                    
                    <div id="setup-ui" class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">開始 2θ (deg)</label>
                            <input type="number" id="start-theta" step="0.0001" value="-32.5100" class="w-full p-2 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg">
                        </div>
                        <button onclick="app.start()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg hover:opacity-90 transition shadow-lg">
                            ナビ開始
                        </button>
                    </div>

                    <div id="measure-ui" class="hidden space-y-4">
                        <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                            <span class="text-xs text-blue-600 font-bold">指示 2θ:</span>
                            <div id="target-theta" class="text-4xl font-mono font-bold text-blue-700">-32.5100</div>
                        </div>

                        <!-- 前回値の表示エリア（左詰め・指定フォーマット） -->
                        <div id="last-input-display" class="hidden p-3 bg-amber-50 rounded-lg border border-amber-200 text-sm text-amber-800 flex items-center gap-1">
                            <span class="font-bold">【前回値】</span>
                            <span>2θ: <b id="last-theta-val" class="font-mono text-base">-</b> | Rwp: <b id="last-rwp-val" class="font-mono text-base">-</b></span>
                        </div>

                        <div>
                            <label class="block text-xs text-gray-500 mb-1">測定された Rwp</label>
                            <input type="number" id="input-rwp" step="0.0001" placeholder="数値を入力" class="w-full p-3 border-2 border-blue-200 rounded-lg focus:border-blue-500 outline-none text-2xl font-mono">
                        </div>
                        <button onclick="app.submitRwp()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg hover:opacity-90 transition shadow-lg flex items-center justify-center gap-2">
                            <span>値を確定して次へ</span>
                        </button>
                        
                        <div class="flex gap-2 pt-2">
                            <button onclick="app.undo()" class="flex-1 py-2 bg-white border border-gray-300 text-gray-600 text-sm font-semibold rounded-lg hover:bg-gray-50 transition active:scale-95">
                                １つ戻る
                            </button>
                            <button onclick="app.reset()" class="flex-1 py-2 text-gray-400 text-sm hover:text-gray-600 transition">
                                全リセット
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Visualization -->
            <div class="lg:col-span-2 space-y-6">
                <div class="card p-6 h-[450px] relative">
                    <canvas id="peakChart"></canvas>
                    <button onclick="app.copyToClipboard()" class="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-md text-xs text-gray-600 transition flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        履歴をコピー
                    </button>
                </div>

                <div class="card p-6 overflow-hidden">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">測定履歴</h2>
                    <div class="max-h-[300px] overflow-y-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-400 uppercase bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-2">No.</th>
                                    <th class="px-4 py-2">2θ (deg)</th>
                                    <th class="px-4 py-2">Rwp</th>
                                    <th class="px-4 py-2">状態</th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="card p-8 max-w-sm w-full text-center scale-up">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">追い込み完了！</h2>
                <div class="space-y-2 mb-6">
                    <p class="text-gray-500">推定ピーク 2θ</p>
                    <p id="final-theta" class="text-4xl font-mono font-bold text-blue-600">0.0000</p>
                    <p class="text-xs text-gray-400">最小 Rwp: <span id="final-rwp">0.00</span></p>
                </div>
                <div class="space-y-3">
                    <button onclick="app.closeModal()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg shadow-lg active:scale-95 transition">
                        履歴・グラフを確認する
                    </button>
                    <button onclick="app.reset()" class="w-full py-2 text-sm text-gray-400 hover:text-gray-600 transition">
                        新しく別の測定を始める
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('peakChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '測定データ',
                    data: [],
                    backgroundColor: '#3b82f6',
                    borderColor: '#3b82f6',
                    showLine: true,
                    tension: 0.15,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#ffffff',
                    pointBorderWidth: 2,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'nearest',
                    intersect: false
                },
                scales: {
                    x: { 
                        title: { display: true, text: '2θ (deg)', font: { weight: 'bold' } },
                        ticks: { 
                            callback: v => v.toFixed(4),
                            maxRotation: 0,
                            autoSkip: true
                        },
                        grid: { color: '#f1f5f9' }
                    },
                    y: { 
                        title: { display: true, text: 'Rwp', font: { weight: 'bold' } },
                        grid: { color: '#f1f5f9' }
                    }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `2θ: ${context.parsed.x.toFixed(4)} | Rwp: ${context.parsed.y.toFixed(4)}`;
                            }
                        }
                    }
                }
            }
        });

        const app = {
            state: {
                mode: 'IDLE',
                history: [],
                currentTheta: 0,
                stepCoarse: 0.0010,
                stepFine: 0.0001,
                direction: 0,
                centerTheta: 0,
                centerRwp: 0,
                minusRwp: null,
                plusRwp: null,
                modalOpened: false
            },

            start() {
                const inputVal = document.getElementById('start-theta').value;
                const startTheta = parseFloat(inputVal);
                if (isNaN(startTheta)) return;
                
                this.state.stepCoarse = parseFloat(document.getElementById('step-coarse').value) || 0.0010;
                this.state.stepFine = parseFloat(document.getElementById('step-fine').value) || 0.0001;
                
                this.state.history = [];
                this.state.currentTheta = startTheta;
                this.state.mode = 'COARSE';
                this.state.modalOpened = false;
                
                chart.data.datasets[0].data = [];
                chart.update();
                this.updateUI();
            },

            submitRwp() {
                const rwpInput = document.getElementById('input-rwp');
                const rwp = parseFloat(rwpInput.value);
                if (isNaN(rwp)) return;

                this.state.stepCoarse = parseFloat(document.getElementById('step-coarse').value) || 0.0010;
                this.state.stepFine = parseFloat(document.getElementById('step-fine').value) || 0.0001;

                const theta = this.state.currentTheta;
                this.state.history.push({ x: theta, y: rwp, mode: this.state.mode });
                
                chart.data.datasets[0].data.push({ x: theta, y: rwp });
                // 並び替えをして線が交差しないようにする
                chart.data.datasets[0].data.sort((a, b) => a.x - b.x);
                chart.update();

                rwpInput.value = '';
                rwpInput.focus();
                this.processLogic();
                this.updateUI();
            },

            processLogic() {
                const h = this.state.history;
                const last = h[h.length - 1];

                if (this.state.mode === 'COARSE') {
                    if (h.length >= 2) {
                        const prev = h[h.length - 2];
                        if (last.y > prev.y) {
                            this.state.centerTheta = prev.x;
                            this.state.centerRwp = prev.y;
                            this.state.mode = 'CHECK_MINUS';
                            this.state.currentTheta = this.state.centerTheta - this.state.stepFine;
                        } else {
                            this.state.currentTheta += this.state.stepCoarse;
                        }
                    } else {
                        this.state.currentTheta += this.state.stepCoarse;
                    }
                } 
                else if (this.state.mode === 'CHECK_MINUS') {
                    this.state.minusRwp = last.y;
                    this.state.mode = 'CHECK_PLUS';
                    this.state.currentTheta = this.state.centerTheta + this.state.stepFine;
                }
                else if (this.state.mode === 'CHECK_PLUS') {
                    this.state.plusRwp = last.y;
                    if (this.state.centerRwp <= this.state.minusRwp && this.state.centerRwp <= this.state.plusRwp) {
                        this.state.mode = 'FINISHED';
                    } else if (this.state.minusRwp < this.state.plusRwp) {
                        this.state.direction = -1;
                        this.state.mode = 'FINE_SCAN';
                        this.state.currentTheta = this.state.centerTheta - (this.state.stepFine * 2);
                    } else {
                        this.state.direction = 1;
                        this.state.mode = 'FINE_SCAN';
                        this.state.currentTheta = this.state.centerTheta + (this.state.stepFine * 2);
                    }
                }
                else if (this.state.mode === 'FINE_SCAN') {
                    // 最新の測定値と、その「直前の同モードでの測定値」を比較
                    const fineHistory = h.filter(item => item.mode === 'FINE_SCAN');
                    if (fineHistory.length >= 2) {
                        const prevFine = fineHistory[fineHistory.length - 2];
                        if (last.y > prevFine.y) {
                            this.state.mode = 'FINISHED';
                        } else {
                            this.state.currentTheta += (this.state.direction * this.state.stepFine);
                        }
                    } else {
                        this.state.currentTheta += (this.state.direction * this.state.stepFine);
                    }
                }

                if (this.state.mode === 'FINISHED' && !this.state.modalOpened) {
                    this.showResult();
                }
            },

            updateUI() {
                const { mode, currentTheta, history } = this.state;
                
                document.getElementById('setup-ui').classList.toggle('hidden', mode !== 'IDLE');
                document.getElementById('measure-ui').classList.toggle('hidden', mode === 'IDLE' || mode === 'FINISHED');
                document.getElementById('target-theta').textContent = currentTheta.toFixed(4);

                const statusBadge = document.getElementById('status-badge');
                statusBadge.textContent = mode;
                document.getElementById('instruction').textContent = this.getInstructionText(mode);
                
                if (mode === 'COARSE') {
                    statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-orange-100 text-orange-600 mb-2 uppercase";
                } else if (mode.includes('CHECK') || mode === 'FINE_SCAN') {
                    statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-600 mb-2 uppercase";
                } else {
                    statusBadge.className = "inline-block px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-600 mb-2 uppercase";
                }

                const lastDisplay = document.getElementById('last-input-display');
                if (history.length > 0) {
                    const lastData = history[history.length - 1];
                    lastDisplay.classList.remove('hidden');
                    document.getElementById('last-theta-val').textContent = lastData.x.toFixed(4);
                    document.getElementById('last-rwp-val').textContent = lastData.y.toFixed(4);
                } else {
                    lastDisplay.classList.add('hidden');
                }

                const minRwp = history.length > 0 ? Math.min(...history.map(h => h.y)) : null;
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = history.map((h, i) => {
                    const isPeak = h.y === minRwp;
                    const rowClass = isPeak ? 'bg-red-50/50' : 'border-b border-gray-50';
                    const textClass = isPeak ? 'text-red-600 font-bold' : 'text-gray-800';
                    return `
                        <tr class="${rowClass} hover:bg-gray-50">
                            <td class="px-4 py-3 font-mono text-gray-400">${i + 1}</td>
                            <td class="px-4 py-3 font-mono ${textClass}">${h.x.toFixed(4)}</td>
                            <td class="px-4 py-3 font-mono ${isPeak ? 'text-red-600 font-bold' : 'text-blue-600'}">${h.y.toFixed(4)}</td>
                            <td class="px-4 py-3 text-[10px] text-gray-400 uppercase">${h.mode}</td>
                        </tr>`;
                }).reverse().join('');
            },

            getInstructionText(mode) {
                switch(mode) {
                    case 'COARSE': return '荒探索中。Rwpが反転するまで数値を増やしてください。';
                    case 'CHECK_MINUS': return '反転確認。中心の「左側」を測定します。';
                    case 'CHECK_PLUS': return '次に、中心の「右側」を測定します。';
                    case 'FINE_SCAN': return '精密追い込み中。Rwpが下がる方向に進みます。';
                    case 'FINISHED': return '測定が完了しました。履歴を確認してください。';
                    default: return '開始 2θ を入力してナビを開始してください。';
                }
            },

            undo() {
                if (this.state.history.length === 0) {
                    this.state.mode = 'IDLE';
                    this.updateUI();
                    return;
                }
                const lastRemoved = this.state.history.pop();
                
                // チャートデータからも削除
                const chartData = chart.data.datasets[0].data;
                const index = chartData.findIndex(d => d.x === lastRemoved.x && d.y === lastRemoved.y);
                if (index !== -1) chartData.splice(index, 1);
                chart.update();

                this.state.mode = lastRemoved.mode;
                this.state.currentTheta = lastRemoved.x;
                this.updateUI();
            },

            showResult() {
                const minData = [...this.state.history].sort((a, b) => a.y - b.y)[0];
                document.getElementById('final-theta').textContent = minData.x.toFixed(4);
                document.getElementById('final-rwp').textContent = minData.y.toFixed(4);
                document.getElementById('result-modal').classList.remove('hidden');
                this.state.modalOpened = true;
                this.state.mode = 'FINISHED';
                this.updateUI();
            },

            closeModal() { document.getElementById('result-modal').classList.add('hidden'); },

            reset() {
                this.state = {
                    mode: 'IDLE',
                    history: [],
                    currentTheta: 0,
                    stepCoarse: parseFloat(document.getElementById('step-coarse').value) || 0.0010,
                    stepFine: parseFloat(document.getElementById('step-fine').value) || 0.0001,
                    direction: 0, centerTheta: 0, centerRwp: 0, minusRwp: null, plusRwp: null, modalOpened: false
                };
                chart.data.datasets[0].data = [];
                chart.update();
                document.getElementById('result-modal').classList.add('hidden');
                this.updateUI();
            },

            copyToClipboard() {
                const sortedHistory = [...this.state.history].sort((a, b) => a.x - b.x);
                const text = sortedHistory.map((h, i) => `${i+1}\t${h.x.toFixed(4)}\t${h.y.toFixed(4)}`).join('\n');
                const tempEl = document.createElement('textarea');
                tempEl.value = "No\t2theta\tRwp\n" + text;
                document.body.appendChild(tempEl);
                tempEl.select();
                document.execCommand('copy');
                document.body.removeChild(tempEl);
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = "コピーしました！";
                setTimeout(() => btn.innerHTML = originalText, 2000);
            }
        };

        window.onload = () => app.updateUI();
    </script>
</body>
</html>
