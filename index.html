<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single step ピーク探索ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .gradient-bg { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .scale-up { animation: scaleUp 0.3s ease-out; }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Single step ピーク探索ナビ</h1>
            <p class="text-gray-600">Rwpの大きさに応じてステップ幅を動的に変更し、最短ルートでピークへ導きます。</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 flex flex-col gap-6">
                <!-- Step Settings -->
                <div class="card p-6 bg-gray-50 border border-gray-200">
                    <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">ステップ設定</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] text-gray-500 mb-1">基本ステップ</label>
                            <input type="number" id="step-coarse" step="0.0001" value="0.0010" class="w-full p-1.5 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-500 mb-1">精密ステップ</label>
                            <input type="number" id="step-fine" step="0.0001" value="0.0001" class="w-full p-1.5 text-sm border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="mt-3 p-2 bg-amber-50 rounded text-[9px] text-amber-900 space-y-1">
                        <p>・Rwp > 50 : <b>10倍速</b> (0.0100)</p>
                        <p>・50 ≥ Rwp > 20 : <b>5倍速</b> (0.0050)</p>
                        <p>・Rwp ≤ 20 : 標準ステップ</p>
                    </div>
                </div>

                <!-- Status Panel -->
                <div class="card p-6 border-t-4 border-blue-500">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">ステータス</h2>
                    <div id="status-badge" class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-gray-100 text-gray-600 mb-2 uppercase">
                        待機中
                    </div>
                    <div id="instruction" class="text-lg font-bold text-gray-800 leading-tight">
                        開始 2θ を入力してください。
                    </div>
                </div>

                <!-- Input/Operations -->
                <div class="card p-6">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">入力 / 操作</h2>
                    
                    <div id="setup-ui" class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">開始 2θ (deg)</label>
                            <input type="number" id="start-theta" step="0.0001" value="-32.5100" class="w-full p-2 border-2 border-gray-200 rounded-lg focus:border-blue-500 outline-none text-lg">
                        </div>
                        <button onclick="app.start()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg hover:opacity-90 transition shadow-lg">
                            ナビ開始
                        </button>
                    </div>

                    <div id="measure-ui" class="hidden space-y-4">
                        <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs text-blue-600 font-bold">指示 2θ:</span>
                                <span id="current-step-label" class="text-[10px] px-1.5 py-0.5 bg-blue-200 text-blue-800 rounded font-bold">STEP: ---</span>
                            </div>
                            <div id="target-theta" class="text-4xl font-mono font-bold text-blue-700">-32.5100</div>
                        </div>

                        <div id="last-input-display" class="hidden p-3 bg-amber-50 rounded-lg border border-amber-200 text-sm text-amber-800 flex items-center gap-1">
                            <span class="font-bold">【前回】</span>
                            <span>Rwp: <b id="last-rwp-val" class="font-mono text-base">-</b></span>
                        </div>

                        <div>
                            <label class="block text-xs text-gray-500 mb-1">測定された Rwp</label>
                            <input type="number" id="input-rwp" step="0.0001" placeholder="数値を入力" class="w-full p-3 border-2 border-blue-200 rounded-lg focus:border-blue-500 outline-none text-2xl font-mono">
                        </div>
                        <button onclick="app.submitRwp()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg hover:opacity-90 transition shadow-lg flex items-center justify-center gap-2">
                            <span>値を確定して次へ</span>
                        </button>
                        
                        <div class="flex gap-2 pt-2">
                            <button onclick="app.undo()" class="flex-1 py-2 bg-white border border-gray-300 text-gray-600 text-sm font-semibold rounded-lg hover:bg-gray-50 transition active:scale-95">
                                １つ戻る
                            </button>
                            <button onclick="app.reset()" class="flex-1 py-2 text-gray-400 text-sm hover:text-gray-600 transition">
                                リセット
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chart and History -->
            <div class="lg:col-span-2 space-y-6">
                <div class="card p-6 h-[450px] relative">
                    <canvas id="peakChart"></canvas>
                    <button onclick="app.copyToClipboard()" class="absolute top-4 right-4 p-2 bg-gray-100 hover:bg-gray-200 rounded-md text-xs text-gray-600 transition">
                        履歴コピー
                    </button>
                </div>

                <div class="card p-6 overflow-hidden">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">測定履歴</h2>
                    <div class="max-h-[300px] overflow-y-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-400 uppercase bg-gray-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-2">No.</th>
                                    <th class="px-4 py-2">2θ (deg)</th>
                                    <th class="px-4 py-2">Rwp</th>
                                    <th class="px-4 py-2">モード</th>
                                </tr>
                            </thead>
                            <tbody id="history-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Result Modal -->
        <div id="result-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="card p-8 max-w-sm w-full text-center scale-up">
                <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">追い込み完了！</h2>
                <div class="space-y-2 mb-6">
                    <p class="text-gray-500">推定ピーク 2θ</p>
                    <p id="final-theta" class="text-4xl font-mono font-bold text-blue-600">0.0000</p>
                    <p class="text-xs text-gray-400">最小 Rwp: <span id="final-rwp">0.00</span></p>
                </div>
                <button onclick="app.closeModal()" class="w-full py-3 gradient-bg text-white font-bold rounded-lg shadow-lg">OK</button>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('peakChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '測定データ',
                    data: [],
                    backgroundColor: '#3b82f6',
                    borderColor: '#3b82f6',
                    showLine: true,
                    tension: 0.15,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#ffffff',
                    pointBorderWidth: 2,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { callback: v => v.toFixed(4) } },
                    y: { title: { display: true, text: 'Rwp' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        const app = {
            state: {
                mode: 'IDLE',
                history: [],
                currentTheta: 0,
                stepCoarse: 0.0010,
                stepFine: 0.0001,
                direction: 1,
                isDirectionFixed: false,
                centerTheta: 0,
                centerRwp: 0,
                modalOpened: false
            },

            start() {
                const startTheta = parseFloat(document.getElementById('start-theta').value);
                if (isNaN(startTheta)) return;
                
                this.state = {
                    ...this.state,
                    mode: 'COARSE',
                    history: [],
                    currentTheta: startTheta,
                    stepCoarse: parseFloat(document.getElementById('step-coarse').value) || 0.0010,
                    stepFine: parseFloat(document.getElementById('step-fine').value) || 0.0001,
                    direction: 1,
                    isDirectionFixed: false,
                    modalOpened: false
                };
                
                chart.data.datasets[0].data = [];
                chart.update();
                this.updateUI();
            },

            submitRwp() {
                const rwpInput = document.getElementById('input-rwp');
                const rwp = parseFloat(rwpInput.value);
                if (isNaN(rwp)) return;

                const theta = this.state.currentTheta;
                this.state.history.push({ x: theta, y: rwp, mode: this.state.mode });
                
                chart.data.datasets[0].data.push({ x: theta, y: rwp });
                chart.data.datasets[0].data.sort((a, b) => a.x - b.x);
                chart.update();

                rwpInput.value = '';
                rwpInput.focus();
                this.processLogic(rwp);
                this.updateUI();
            },

            getNextStepSize(currentRwp) {
                if (currentRwp > 50) {
                    return this.state.stepCoarse * 10; // 10倍速
                } else if (currentRwp > 20) {
                    return this.state.stepCoarse * 5;  // 5倍速
                }
                return this.state.stepCoarse; // 標準
            },

            processLogic(currentRwp) {
                const h = this.state.history;
                if (h.length === 0) return;
                const last = h[h.length - 1];

                if (this.state.mode === 'COARSE') {
                    const stepSize = this.getNextStepSize(currentRwp);

                    if (h.length === 2) {
                        const first = h[0];
                        if (last.y > first.y) {
                            if (!this.state.isDirectionFixed) {
                                this.state.direction = -1;
                                this.state.isDirectionFixed = true;
                                this.state.currentTheta = first.x + (this.state.direction * stepSize);
                                return;
                            } else {
                                this.switchToFineScan(h[h.length-2]);
                            }
                        } else {
                            this.state.isDirectionFixed = true;
                            this.state.currentTheta += (this.state.direction * stepSize);
                        }
                    } else if (h.length > 2) {
                        const prev = h[h.length - 2];
                        if (last.y > prev.y) {
                            this.switchToFineScan(prev);
                        } else {
                            this.state.currentTheta += (this.state.direction * stepSize);
                        }
                    } else {
                        this.state.currentTheta += (this.state.direction * stepSize);
                    }
                } 
                else if (this.state.mode === 'CHECK_MINUS') {
                    this.state.mode = 'CHECK_PLUS';
                    this.state.currentTheta = this.state.centerTheta + this.state.stepFine;
                }
                else if (this.state.mode === 'CHECK_PLUS') {
                    const plusRwp = last.y;
                    const minusRwp = h[h.length - 2].y;
                    const centerRwp = this.state.centerRwp;

                    if (centerRwp <= minusRwp && centerRwp <= plusRwp) {
                        this.state.mode = 'FINISHED';
                    } else {
                        this.state.direction = (minusRwp < plusRwp) ? -1 : 1;
                        this.state.mode = 'FINE_SCAN';
                        this.state.currentTheta = this.state.centerTheta + (this.state.direction * 2 * this.state.stepFine);
                    }
                }
                else if (this.state.mode === 'FINE_SCAN') {
                    const fineH = h.filter(x => x.mode === 'FINE_SCAN');
                    if (fineH.length >= 2) {
                        if (last.y > fineH[fineH.length - 2].y) {
                            this.state.mode = 'FINISHED';
                        } else {
                            this.state.currentTheta += (this.state.direction * this.state.stepFine);
                        }
                    } else {
                        this.state.currentTheta += (this.state.direction * this.state.stepFine);
                    }
                }

                if (this.state.mode === 'FINISHED' && !this.state.modalOpened) {
                    this.showResult();
                }
            },

            switchToFineScan(bestPoint) {
                this.state.centerTheta = bestPoint.x;
                this.state.centerRwp = bestPoint.y;
                this.state.mode = 'CHECK_MINUS';
                this.state.currentTheta = this.state.centerTheta - this.state.stepFine;
            },

            updateUI() {
                const { mode, currentTheta, history, stepCoarse } = this.state;
                document.getElementById('setup-ui').classList.toggle('hidden', mode !== 'IDLE');
                document.getElementById('measure-ui').classList.toggle('hidden', mode === 'IDLE' || mode === 'FINISHED');
                document.getElementById('target-theta').textContent = currentTheta.toFixed(4);

                const hasHistory = history.length > 0;
                const lastRwp = hasHistory ? history[history.length-1].y : null;
                
                const stepLabel = document.getElementById('current-step-label');
                if (mode === 'COARSE') {
                    if (!hasHistory) {
                        stepLabel.textContent = "STEP: ---";
                    } else {
                        const nextStep = this.getNextStepSize(lastRwp);
                        stepLabel.textContent = `STEP: ${nextStep.toFixed(4)}`;
                    }
                } else if (mode !== 'IDLE' && mode !== 'FINISHED') {
                    stepLabel.textContent = `STEP: ${this.state.stepFine.toFixed(4)}`;
                }

                document.getElementById('status-badge').textContent = mode;
                document.getElementById('instruction').textContent = this.getInstructionText(mode, lastRwp);
                
                const lastDisplay = document.getElementById('last-input-display');
                if (hasHistory) {
                    lastDisplay.classList.remove('hidden');
                    document.getElementById('last-rwp-val').textContent = lastRwp.toFixed(4);
                } else {
                    lastDisplay.classList.add('hidden');
                }

                const minRwp = hasHistory ? Math.min(...history.map(h => h.y)) : null;
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = history.map((h, i) => {
                    const isPeak = h.y === minRwp;
                    return `
                        <tr class="${isPeak ? 'bg-red-50/50 font-bold' : 'border-b border-gray-50'}">
                            <td class="px-4 py-2 text-gray-400">${i + 1}</td>
                            <td class="px-4 py-2 font-mono">${h.x.toFixed(4)}</td>
                            <td class="px-4 py-2 font-mono text-blue-600">${h.y.toFixed(4)}</td>
                            <td class="px-4 py-2 text-[10px] text-gray-400">${h.mode}</td>
                        </tr>`;
                }).reverse().join('');
            },

            getInstructionText(mode, rwp) {
                if (mode === 'COARSE') {
                    if (rwp === null) return '開始地点の Rwp を測定・入力してください。';
                    if (rwp > 50) return 'Rwp > 50 のため、10倍速で超高速探索中！';
                    if (rwp > 20) return 'Rwp > 20 のため、5倍速でザクザク探索中...';
                    return 'Rwpが下がってきました。標準ステップで慎重に探索中。';
                }
                switch(mode) {
                    case 'CHECK_MINUS': return 'ピーク付近。精密比較（左）を行います。';
                    case 'CHECK_PLUS': return '精密比較（右）を行います。';
                    case 'FINE_SCAN': return '精密追い込み中...';
                    case 'FINISHED': return '完了しました！';
                    default: return '開始してください。';
                }
            },

            undo() {
                if (this.state.history.length === 0) return this.reset();
                this.state.history.pop();
                const last = this.state.history[this.state.history.length - 1];
                if (last) {
                    this.state.mode = last.mode;
                    this.state.currentTheta = last.x;
                } else {
                    this.reset();
                }
                this.updateUI();
                chart.data.datasets[0].data.pop();
                chart.update();
            },

            showResult() {
                const minData = [...this.state.history].sort((a, b) => a.y - b.y)[0];
                document.getElementById('final-theta').textContent = minData.x.toFixed(4);
                document.getElementById('final-rwp').textContent = minData.y.toFixed(4);
                document.getElementById('result-modal').classList.remove('hidden');
                this.state.modalOpened = true;
            },

            closeModal() { document.getElementById('result-modal').classList.add('hidden'); },

            reset() {
                document.getElementById('result-modal').classList.add('hidden');
                this.state.mode = 'IDLE';
                this.state.history = [];
                this.updateUI();
            },

            copyToClipboard() {
                const text = this.state.history.map((h, i) => `${i+1}\t${h.x.toFixed(4)}\t${h.y.toFixed(4)}`).join('\n');
                const temp = document.createElement('textarea');
                temp.value = "No\t2theta\tRwp\n" + text;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
            }
        };
    </script>
</body>
</html>
